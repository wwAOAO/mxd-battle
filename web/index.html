<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MXD Battle Sync Test</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        margin: 0;
        overflow: hidden;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        color: #172033;
        background: #f4f7fb;
      }

      main {
        display: grid;
        grid-template-columns: 320px minmax(0, 1fr);
        gap: 16px;
        height: 100vh;
        padding: 16px;
        overflow: hidden;
      }

      aside,
      .map-wrap {
        border: 1px solid #d7dee9;
        background: #ffffff;
      }

      aside {
        display: flex;
        flex-direction: column;
        gap: 14px;
        min-height: 0;
        overflow: auto;
        padding: 16px;
      }

      h1 {
        margin: 0;
        font-size: 20px;
        line-height: 1.2;
      }

      label {
        display: grid;
        gap: 6px;
        font-size: 13px;
        font-weight: 650;
      }

      input,
      select,
      button {
        height: 36px;
        border: 1px solid #c7d1df;
        border-radius: 6px;
        padding: 0 10px;
        font: inherit;
        background: #ffffff;
      }

      button {
        cursor: pointer;
        font-weight: 700;
        color: #ffffff;
        border-color: #2c6eea;
        background: #2c6eea;
      }

      button.secondary {
        color: #243047;
        border-color: #c7d1df;
        background: #eef3f9;
      }

      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .panel {
        display: grid;
        gap: 10px;
        padding: 12px;
        border: 1px solid #d7dee9;
        border-radius: 6px;
        background: #f8fbff;
      }

      .panel-title {
        margin: 0;
        color: #243047;
        font-size: 14px;
        font-weight: 750;
      }
      .hud-panel {
        gap: 8px;
      }

      .hud-lines {
        display: grid;
        gap: 6px;
        color: #243047;
        font-size: 12px;
        line-height: 1.4;
      }

      .hud-bars {
        display: grid;
        gap: 8px;
      }

      .hud-bar {
        display: grid;
        gap: 4px;
      }

      .hud-bar-label {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        color: #243047;
        font-size: 12px;
        font-weight: 600;
      }

      .hud-bar-track {
        overflow: hidden;
        height: 14px;
        border: 1px solid #c7d1df;
        border-radius: 999px;
        background: #d7dee9;
      }

      .hud-bar-fill {
        height: 100%;
        border-radius: 999px;
      }

      .hud-bar-fill.hp {
        background: #cf3d4d;
      }

      .hud-bar-fill.mp {
        background: #2c6eea;
      }

      .stat-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
        min-width: 0;
      }

      .stat-grid label {
        min-width: 0;
      }

      .stat-grid input,
      .stat-grid select {
        width: 100%;
        min-width: 0;
      }

      .equipment-label {
        align-content: start;
      }

      .equipment-requirement {
        color: #5f6c80;
        font-size: 11px;
        font-weight: 500;
        line-height: 1.35;
        overflow-wrap: anywhere;
      }

      .equipment-requirement.unmet {
        color: #c2410c;
      }

      .equipment-feedback {
        color: #9a3412;
        font-size: 12px;
        line-height: 1.4;
        white-space: pre-wrap;
      }

      .status {
        padding: 10px;
        border-radius: 6px;
        color: #5f3600;
        background: #fff1d6;
        font-size: 13px;
      }

      .status.connected {
        color: #0d5130;
        background: #dff7ea;
      }

      .map-wrap {
        position: relative;
        overflow: hidden;
        min-height: 0;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        background:
          linear-gradient(rgba(44, 110, 234, 0.08) 1px, transparent 1px),
          linear-gradient(90deg, rgba(44, 110, 234, 0.08) 1px, transparent 1px),
          #edf5ef;
        background-size: 48px 48px;
      }

      pre {
        flex: 1;
        min-height: 120px;
        overflow: auto;
        margin: 0;
        padding: 10px;
        border: 1px solid #d7dee9;
        border-radius: 6px;
        color: #dbe7ff;
        background: #111827;
        font-size: 12px;
        line-height: 1.45;
        white-space: pre-wrap;
      }

      @media (max-width: 860px) {
        main {
          grid-template-columns: 1fr;
          grid-template-rows: auto minmax(0, 1fr);
        }

        aside {
          max-height: 42vh;
        }

        .map-wrap {
          min-height: 0;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <aside>
        <h1>MXD Battle Sync Test</h1>

        <label>
          Room
          <select id="room">
            <option value="Rainbow_Island.mushroom_village">
              Rainbow_Island.mushroom_village
            </option>
            <option value="Treasure_Island.city">Treasure_Island.city</option>
          </select>
        </label>

        <label>
          Player ID
          <input id="player" value="" />
        </label>

        <label>
          Name
          <input id="name" value="Hero" />
        </label>

        <label>
          Gender
          <select id="gender">
            <option value="">None</option>
            <option value="male">male</option>
            <option value="female">female</option>
          </select>
        </label>

        <div class="row">
          <button id="connect">Connect</button>
          <button id="disconnect" class="secondary">Disconnect</button>
        </div>

        <div id="status" class="status">Disconnected</div>

                <section class="panel hud-panel" id="character-panel">
          <p class="panel-title">Character</p>
          <div id="hud-lines" class="hud-lines">
            <div>Not connected</div>
          </div>
          <div class="hud-bars">
            <div class="hud-bar">
              <div class="hud-bar-label">
                <span>HP</span>
                <span id="hud-hp-text">0 / 0</span>
              </div>
              <div class="hud-bar-track">
                <div id="hud-hp-fill" class="hud-bar-fill hp" style="width: 0%"></div>
              </div>
            </div>
            <div class="hud-bar">
              <div class="hud-bar-label">
                <span>MP</span>
                <span id="hud-mp-text">0 / 0</span>
              </div>
              <div class="hud-bar-track">
                <div id="hud-mp-fill" class="hud-bar-fill mp" style="width: 0%"></div>
              </div>
            </div>
          </div>
        </section>


        <section class="panel" id="primary-stat-panel">
          <p class="panel-title">Primary Stat</p>
          <div class="stat-grid">
            <label>
              STR
              <input
                id="stat-strength"
                type="number"
                min="0"
                step="1"
                value="0"
              />
            </label>
            <label>
              INT
              <input
                id="stat-intelligence"
                type="number"
                min="0"
                step="1"
                value="0"
              />
            </label>
            <label>
              AGI
              <input
                id="stat-agility"
                type="number"
                min="0"
                step="1"
                value="0"
              />
            </label>
            <label>
              LUK
              <input id="stat-luck" type="number" min="0" step="1" value="0" />
            </label>
          </div>
        </section>

        <section class="panel" id="equipment-panel">
          <p class="panel-title">Equipment</p>
          <div id="equipment-controls" class="stat-grid"></div>
          <div id="equipment-feedback" class="equipment-feedback"></div>
        </section>

        <pre id="log"></pre>
      </aside>

      <section class="map-wrap">
        <canvas id="map" width="1280" height="720"></canvas>
      </section>
    </main>

    <script>
      const world = {
        id: "wild_x",
        width: 2400,
        height: 1500,
        terrain: [],
        polygons: [],
      };
      const players = new Map();
      const projectiles = new Map();
      const monsters = new Map();
      const lootDrops = new Map();
      const selfId =
        "role-" + Math.random().toString(16).slice(2, 8).padEnd(6, "0");

      const $ = (id) => document.getElementById(id);
      const canvas = $("map");
      const ctx = canvas.getContext("2d");
      let socket = null;
      let reconnectAfterReload = false;
      let reconnectTimer = 0;
      const pressedKeys = new Set();
      const attacks = [];
      const damageTexts = [];
      let lastInputX = 0;
      let lastInputY = 0;
      let lastFrameAt = performance.now();
      let jobStatConfigs = {};
      let equipmentConfigs = {};
      let lastEquipFailures = [];
      const statInputIds = {
        strength: "stat-strength",
        intelligence: "stat-intelligence",
        agility: "stat-agility",
        luck: "stat-luck",
      };

      $("player").value = selfId;

      function log(message, data) {
        const line = data
          ? `${new Date().toLocaleTimeString()} ${message} ${JSON.stringify(data)}`
          : `${new Date().toLocaleTimeString()} ${message}`;
        $("log").textContent = `${line}\n${$("log").textContent}`.slice(
          0,
          9000,
        );
      }

      function setStatus(text, connected) {
        $("status").textContent = text;
        $("status").classList.toggle("connected", connected);
      }

      function connect() {
        if (
          socket &&
          (socket.readyState === WebSocket.OPEN ||
            socket.readyState === WebSocket.CONNECTING)
        ) {
          return;
        }

        window.clearTimeout(reconnectTimer);
        reconnectTimer = 0;
        const params = new URLSearchParams({
          room: $("room").value,
          player: $("player").value.trim(),
          name: $("name").value.trim(),
          gender: $("gender").value,
        });
        const currentSocket = new WebSocket(`ws://${location.host}/ws?${params}`);
        socket = currentSocket;

        currentSocket.addEventListener("open", () => {
          if (socket !== currentSocket) return;
          reconnectAfterReload = false;
          setStatus(`Connected to room ${$("room").value}`, true);
          log("connected");
        });

        currentSocket.addEventListener("message", (event) => {
          if (socket !== currentSocket) return;
          const payload = JSON.parse(event.data);
          applyEvent(payload);
          log(payload.type, payload);
        });

        currentSocket.addEventListener("close", () => {
          if (socket !== currentSocket) return;
          socket = null;
          if (reconnectAfterReload) {
            setStatus(`Room ${$("room").value} reloaded, reconnecting...`, false);
            reconnectTimer = window.setTimeout(connect, 500);
            return;
          }
          setStatus("Disconnected", false);
          log("closed");
        });

        currentSocket.addEventListener("error", () => {
          if (socket !== currentSocket) return;
          setStatus("Connection error", false);
          log("error");
        });
      }

      async function loadRooms() {
        try {
          const response = await fetch("/rooms");
          const payload = await response.json();
          const rooms = Array.isArray(payload.rooms) ? payload.rooms : [];
          if (rooms.length === 0) return;

          const selectedRoom = $("room").value;
          $("room").textContent = "";
          for (const room of rooms) {
            const option = document.createElement("option");
            option.value = room;
            option.textContent = room;
            $("room").appendChild(option);
          }
          if (rooms.includes(selectedRoom)) {
            $("room").value = selectedRoom;
          } else {
            $("room").value = rooms[0];
          }
        } catch (error) {
          log("failed to load rooms", { message: error.message });
        }
      }

      async function loadEquipmentStats() {
        try {
          const response = await fetch("/equipment-stats");
          if (!response.ok) return;
          equipmentConfigs = await response.json();
          renderEquipmentPanel();
          log("equipment stats loaded", {
            count: Object.keys(equipmentConfigs).length,
          });
        } catch (error) {
          log("failed to load equipment stats", { message: error.message });
        }
      }

      async function loadJobStats() {
        const candidates = ["/job-stats"];
        for (const path of candidates) {
          try {
            const response = await fetch(path);
            if (!response.ok) continue;
            jobStatConfigs = await response.json();
            log("job stats loaded", { path });
            return;
          } catch (error) {
            log("failed to load job stats", { path, message: error.message });
          }
        }
      }

      function disconnect() {
        reconnectAfterReload = false;
        window.clearTimeout(reconnectTimer);
        reconnectTimer = 0;
        if (socket) socket.close();
        socket = null;
        setStatus("Disconnected", false);
      }

      function jump() {
        if (!socket || socket.readyState !== WebSocket.OPEN) {
          log("not connected");
          return;
        }

        socket.send(JSON.stringify({ type: "jump" }));
      }

      function drop() {
        if (!socket || socket.readyState !== WebSocket.OPEN) {
          log("not connected");
          return;
        }

        socket.send(JSON.stringify({ type: "drop" }));
      }

      function usePortal() {
        if (!socket || socket.readyState !== WebSocket.OPEN) {
          log("not connected");
          return;
        }

        socket.send(JSON.stringify({ type: "portal" }));
      }

      function normalAttack() {
        if (!socket || socket.readyState !== WebSocket.OPEN) {
          log("not connected");
          return;
        }

        socket.send(JSON.stringify({ type: "attack" }));
      }

      function pickupLoot() {
        if (!socket || socket.readyState !== WebSocket.OPEN) {
          log("not connected");
          return;
        }

        socket.send(JSON.stringify({ type: "pickup" }));
      }
      function castMagicMissile() {
        if (!socket || socket.readyState !== WebSocket.OPEN) {
          log("not connected");
          return;
        }

        socket.send(
          JSON.stringify({ type: "skill", skillId: "magic_missile" }),
        );
      }

      function sendInput(inputX, inputY) {
        if (!socket || socket.readyState !== WebSocket.OPEN) return;
        if (inputX === lastInputX && inputY === lastInputY) return;

        lastInputX = inputX;
        lastInputY = inputY;
        socket.send(JSON.stringify({ type: "input", inputX, inputY }));
      }

      function applyEvent(event) {
        if (event.type === "room_reloaded") {
          handleRoomReloaded(event);
          return;
        }
        if (event.type === "snapshot" && event.state) {
          world.id = event.state.map.id;
          world.width = event.state.map.width;
          world.height = event.state.map.height;
          world.groundY = event.state.map.groundY;
          world.terrain = event.state.map.terrain || [];
          world.polygons = event.state.map.polygons || [];
          world.platforms = event.state.map.platforms || [];
          world.walls = event.state.map.walls || [];
          world.ladders = event.state.map.ladders || [];
          world.portals = event.state.map.portals || [];
          world.monsterSpawns = event.state.map.monsterSpawns || [];
          log("map geometry", {
            room: event.state.id,
            terrain: world.terrain.length,
            polygons: world.polygons.length,
            platforms: world.platforms.length,
            walls: world.walls.length,
            ladders: world.ladders.length,
          });
          $("room").value = event.state.id;
          players.clear();
          monsters.clear();
          projectiles.clear();
          Object.values(event.state.players).forEach((player) => {
            players.set(player.id, withDisplayPosition(player));
          });
          Object.values(event.state.monsters || {}).forEach((monster) => {
            monsters.set(monster.id, withDisplayMonster(monster));
          });
          Object.values(event.state.projectiles || {}).forEach((projectile) => {
            projectiles.set(projectile.id, withDisplayProjectile(projectile));
          });
          Object.values(event.state.lootDrops || {}).forEach((drop) => {
            lootDrops.set(drop.id, drop);
          });
          syncPrimaryStatForm();
          renderEquipmentPanel();
          renderSelfHud();
        }
        if (event.equipResult) {
          lastEquipFailures = Array.isArray(event.equipResult.failures)
            ? event.equipResult.failures
            : [];
        }
        if (event.monster) {
          const previousMonster = monsters.get(event.monster.id);
          monsters.set(event.monster.id, withDisplayMonster(event.monster, previousMonster));
        }
        if (event.lootDrop) {
          lootDrops.set(event.lootDrop.id, event.lootDrop);
        }
        if ((event.type === "loot_picked" || event.type === "loot_removed") && event.lootDropId) {
          lootDrops.delete(event.lootDropId);
        }
        if (event.player) {
          const previous = players.get(event.player.id);
          players.set(event.player.id, {
            ...event.player,
            displayX: previous ? previous.displayX : event.player.x,
            displayY: previous ? previous.displayY : event.player.y,
          });
          if (event.player.id === $("player").value.trim()) {
            $("gender").value = event.player.gender || "";
          }
          if (event.player.id === $("player").value.trim()) {
            syncPrimaryStatForm();
            renderEquipmentPanel();
          renderSelfHud();
          }
        }
        if ((event.type === "player_attacked" || event.type === "monster_attacked") && event.attack) {
          attacks.push({
            ...event.attack,
            expiresAt: performance.now() + 180,
          });
          addDamageText(event.attack);
        }
        if (
          (event.type === "player_skill_cast" ||
            event.type === "player_skill_hit") &&
          event.skill
        ) {
          if (event.projectile) {
            const previous = projectiles.get(event.projectile.id);
            projectiles.set(
              event.projectile.id,
              withDisplayProjectile(event.projectile, previous),
            );
          }
          addSkillDamageText(event.skill);
        }
        if (event.type === "projectile_moved" && event.projectile) {
          const previous = projectiles.get(event.projectile.id);
          projectiles.set(
            event.projectile.id,
            withDisplayProjectile(event.projectile, previous),
          );
        }
        if (event.type === "projectile_removed" && event.projectileId) {
          projectiles.delete(event.projectileId);
        }
        if (event.type === "player_left") players.delete(event.playerId);
      }

      function handleRoomReloaded(event) {
        const room = event.room || $("room").value;
        if (room) $("room").value = room;
        players.clear();
        monsters.clear();
        projectiles.clear();
        lootDrops.clear();
        attacks.length = 0;
        damageTexts.length = 0;
        lastInputX = 0;
        lastInputY = 0;
        pressedKeys.clear();
        renderSelfHud();
        reconnectAfterReload = true;
        setStatus(`Room ${room} reloaded, reconnecting...`, false);
        log("room reloaded, reconnecting", event);
        if (socket) socket.close();
        else reconnectTimer = window.setTimeout(connect, 500);
      }
      function addDamageText(attack) {
        if (!attack.targetId || !attack.outcome || !attack.outcome.isHit)
          return;

        const now = performance.now();
        const self = $("player").value.trim();
        const target = attack.targetType === "monster"
          ? monsters.get(attack.targetId)
          : players.get(attack.targetId);
        const attacker = attack.targetType === "player"
          ? monsters.get(attack.attackerId) || players.get(attack.attackerId)
          : players.get(attack.attackerId) || monsters.get(attack.attackerId);
        const anchor = target || attacker;
        if (!anchor) return;

        const isOutgoing = attack.attackerId === self;
        const isIncoming = attack.targetId === self;
        const label = isIncoming
          ? `-${attack.outcome.damage}`
          : isOutgoing
            ? `${attack.outcome.damage}`
            : `${attack.outcome.damage}`;

        damageTexts.push({
          x: anchor.x,
          y: anchor.y - (anchor.height || 96) - 10,
          label,
          color: isIncoming ? "#cf3d4d" : isOutgoing ? "#f59e0b" : "#ffffff",
          stroke: isIncoming ? "#5f141d" : "#111827",
          createdAt: now,
          expiresAt: now + 850,
        });
      }

      function addSkillDamageText(skill) {
        if (!skill.targetId || !skill.outcome || !skill.outcome.isHit) return;
        addDamageText({
          attackerId: skill.casterId,
          targetId: skill.targetId,
          targetType: skill.targetType,
          outcome: skill.outcome,
        });
      }

      function readPrimaryStatForm() {
        return {
          strength: readStatInput("strength"),
          intelligence: readStatInput("intelligence"),
          agility: readStatInput("agility"),
          luck: readStatInput("luck"),
        };
      }

      function readStatInput(key) {
        const value = Number($(statInputIds[key]).value);
        return Number.isFinite(value) ? Math.max(0, Math.trunc(value)) : 0;
      }

      function equipmentPanelSlots() {
        return [
          "weapon_main",
          "weapon_sub",
          "ring1",
          "ring2",
          "armor",
          "shoes",
          "accessory",
          "misc",
        ];
      }

      function groupEquipmentsBySlot() {
        const groups = new Map();
        for (const slot of equipmentPanelSlots()) {
          groups.set(slot, []);
        }
        for (const [id, config] of Object.entries(equipmentConfigs)) {
          const occupied = Array.isArray(config.occupiesSlots)
            ? config.occupiesSlots
            : [];
          const slots =
            occupied.length > 0 ? occupied : [config.slot || "misc"];
          for (const slot of slots) {
            const items = groups.get(slot) || [];
            items.push({ id, ...config });
            groups.set(slot, items);
          }
        }
        return equipmentPanelSlots().map((slot) => [
          slot,
          groups.get(slot) || [],
        ]);
      }

      function getEquipmentRequirementText(requirement, config) {
        const entries = [];
        if (requirement) {
          entries.push(
            ...[
              ["STR", requirement.strength],
              ["INT", requirement.intelligence],
              ["AGI", requirement.agility],
              ["LUK", requirement.luck],
            ]
              .filter(([, value]) => Number(value) > 0)
              .map(([label, value]) => label + " " + value),
          );
        }
        if (Number(config?.minLevel) > 0) {
          entries.push("Lv " + Number(config.minLevel));
        }
        if (
          Array.isArray(config?.allowedJobs) &&
          config.allowedJobs.length > 0
        ) {
          entries.push("Job " + config.allowedJobs.join("/"));
        }
        if (
          Array.isArray(config?.allowedGenders) &&
          config.allowedGenders.length > 0
        ) {
          entries.push("Gender " + config.allowedGenders.join("/"));
        }
        return entries.join("  ");
      }

      function getRequirementStatSource(player) {
        if (!player || !player.stat) {
          return readPrimaryStatForm();
        }
        return addStats(player.stat.base, player.stat.bonus, player.stat.extra);
      }

      function canWearEquipment(player, config) {
        if (!config) return false;
        const stat = getRequirementStatSource(player);
        const requirement = config.requirement || {};
        const level = Number(player?.level) || 0;
        const jobCode =
          player?.jobCode ||
          new URLSearchParams(location.search).get("job") ||
          "";
        const gender = player?.gender || $("gender").value || "";
        const matchesJob =
          !Array.isArray(config.allowedJobs) ||
          config.allowedJobs.length === 0 ||
          config.allowedJobs.some(
            (value) =>
              String(value).toLowerCase() === String(jobCode).toLowerCase(),
          );
        const matchesGender =
          !Array.isArray(config.allowedGenders) ||
          config.allowedGenders.length === 0 ||
          config.allowedGenders.some(
            (value) =>
              String(value).toLowerCase() === String(gender).toLowerCase(),
          );
        return (
          (Number(stat.strength) || 0) >= (Number(requirement.strength) || 0) &&
          (Number(stat.intelligence) || 0) >=
            (Number(requirement.intelligence) || 0) &&
          (Number(stat.agility) || 0) >= (Number(requirement.agility) || 0) &&
          (Number(stat.luck) || 0) >= (Number(requirement.luck) || 0) &&
          level >= (Number(config.minLevel) || 0) &&
          matchesJob &&
          matchesGender
        );
      }

      function sendEquipment() {
        if (!socket || socket.readyState !== WebSocket.OPEN) return;
        const controls = document.querySelectorAll("[data-equipment-slot]");
        const equipmentsBySlot = {};
        for (const control of controls) {
          if (control.value)
            equipmentsBySlot[control.dataset.equipmentSlot] = control.value;
        }
        socket.send(JSON.stringify({ type: "equipment", equipmentsBySlot }));
        log("equipment sent", { equipmentsBySlot });
      }

      function eventlessEquipmentSlots(player, configs) {
        const result = {};
        const ids = Array.isArray(player?.equipmentIds)
          ? player.equipmentIds
          : [];
        for (const id of ids) {
          const config = configs[id];
          if (!config) continue;
          const slots = Array.isArray(config.occupiesSlots)
            ? config.occupiesSlots
            : [];
          if ((config.slot || "") === "ring" && slots.length <= 1) {
            if (!result.ring1) result.ring1 = id;
            else if (!result.ring2) result.ring2 = id;
            continue;
          }
          if (slots.length > 0) {
            for (const slot of slots) {
              result[slot] = id;
            }
            continue;
          }
          result[config.slot || "misc"] = id;
        }
        return result;
      }

      function renderEquipmentPanel() {
        const root = $("equipment-controls");
        if (!root) return;
        root.textContent = "";
        const self = players.get($("player").value.trim());
        const equipped = new Set((self && self.equipmentIds) || []);
        const groups = groupEquipmentsBySlot();
        if (groups.length === 0) {
          const empty = document.createElement("div");
          empty.textContent = "No equipment config";
          root.appendChild(empty);
          return;
        }

        for (const [slot, items] of groups) {
          const label = document.createElement("label");
          label.textContent = slot;
          label.className = "equipment-label";
          const select = document.createElement("select");
          select.dataset.equipmentSlot = slot;
          const emptyOption = document.createElement("option");
          emptyOption.value = "";
          emptyOption.textContent = "None";
          select.appendChild(emptyOption);

          for (const item of items) {
            const option = document.createElement("option");
            const requirementText = getEquipmentRequirementText(
              item.requirement,
            );
            const wearable = canWearEquipment(self, item);
            option.value = item.id;
            option.textContent = requirementText
              ? (item.name || item.id) + " (" + requirementText + ")"
              : item.name || item.id;
            option.disabled = !wearable && !equipped.has(item.id);
            if (equipped.has(item.id)) option.selected = true;
            select.appendChild(option);
          }
          select.addEventListener("change", sendEquipment);
          label.appendChild(select);

          const hint = document.createElement("div");
          hint.className = "equipment-requirement";
          const selectedConfig = equipmentConfigs[select.value];
          if (selectedConfig) {
            const requirementText = getEquipmentRequirementText(
              selectedConfig.requirement,
              selectedConfig,
            );
            if (requirementText) {
              hint.textContent = "Require: " + requirementText;
              hint.classList.toggle(
                "unmet",
                !canWearEquipment(self, selectedConfig),
              );
            }
          }
          label.appendChild(hint);
          root.appendChild(label);
        }
      }

      function sendPrimaryStat() {
        if (!socket || socket.readyState !== WebSocket.OPEN) return;
        const stat = readPrimaryStatForm();
        applyLocalPrimaryStat(stat);
        socket.send(JSON.stringify({ type: "stat", stat }));
        log("stat sent", stat);
      }

      function applyLocalPrimaryStat(stat) {
        const playerId = $("player").value.trim();
        const self = players.get(playerId);
        if (!self || !self.stat) return;

        const nextStat = {
          ...self.stat,
          base: {
            ...(self.stat.base || {}),
            ...stat,
          },
        };
        nextStat.final = addStats(
          nextStat.base,
          nextStat.bonus,
          nextStat.equipment,
          nextStat.extra,
        );

        players.set(playerId, {
          ...self,
          stat: nextStat,
          combatStat: calculateCombatStat(
            nextStat.final,
            self.jobCode,
            aggregateSelectedEquipmentCombatStat(),
          ),
        });
      }

      function addStats(...layers) {
        const total = {
          strength: 0,
          intelligence: 0,
          agility: 0,
          luck: 0,
          hp: 0,
          mp: 0,
          hpMax: 0,
          mpMax: 0,
        };

        for (const layer of layers) {
          if (!layer) continue;
          for (const key of Object.keys(total)) {
            total[key] += Number(layer[key]) || 0;
          }
        }
        return total;
      }

      function applyStatGrowth(stat, jobCode) {
        const code = jobCode || "beginner";
        const job = jobStatConfigs[code] || jobStatConfigs.beginner || {};
        const allocation = job.allocation || {};
        const next = { ...stat };
        next.hpMax += calculateAllocatedStat(next, allocation.hpMax);
        next.mpMax += calculateAllocatedStat(next, allocation.mpMax);
        next.hp = Math.min(next.hp, next.hpMax);
        next.mp = Math.min(next.mp, next.mpMax);
        return next;
      }

      function calculateCombatStat(stat, jobCode, equipmentCombatStat = {}) {
        const code = jobCode || "beginner";
        const job = jobStatConfigs[code] || jobStatConfigs.beginner || {};
        const allocation = job.allocation || {};

        const attackTiming = calculateAttackTiming(stat, job);
        return {
          physicalAttackMin:
            calculateAllocatedStat(stat, allocation.physicalAttackMin) +
            (Number(equipmentCombatStat.physicalAttackMin) || 0),
          physicalAttackMax:
            calculateAllocatedStat(stat, allocation.physicalAttackMax) +
            (Number(equipmentCombatStat.physicalAttackMax) || 0),
          magicAttackMin:
            calculateAllocatedStat(stat, allocation.magicAttackMin) +
            (Number(equipmentCombatStat.magicAttackMin) || 0),
          magicAttackMax:
            calculateAllocatedStat(stat, allocation.magicAttackMax) +
            (Number(equipmentCombatStat.magicAttackMax) || 0),
          physicalDefense:
            calculateAllocatedStat(stat, allocation.physicalDefense) +
            (Number(equipmentCombatStat.physicalDefense) || 0),
          magicDefense:
            calculateAllocatedStat(stat, allocation.magicDefense) +
            (Number(equipmentCombatStat.magicDefense) || 0),
          moveSpeed: Math.max(
            0,
            Math.min(
              600,
              calculateAllocatedStat(stat, allocation.moveSpeed) +
                (Number(equipmentCombatStat.moveSpeed) || 0),
            ),
          ),
          evasion:
            calculateAllocatedStat(stat, allocation.evasion) +
            (Number(equipmentCombatStat.evasion) || 0),
          accuracy:
            calculateAllocatedStat(stat, allocation.accuracy) +
            (Number(equipmentCombatStat.accuracy) || 0),
          critRate:
            calculateAllocatedStat(stat, allocation.critRate) +
            (Number(equipmentCombatStat.critRate) || 0),
          critDamage:
            calculateAllocatedStat(stat, allocation.critDamage) +
            (Number(equipmentCombatStat.critDamage) || 0),
          hpRecovery:
            calculateAllocatedFloatStat(stat, allocation.hpRecovery) +
            (Number(equipmentCombatStat.hpRecovery) || 0),
          mpRecovery:
            calculateAllocatedFloatStat(stat, allocation.mpRecovery) +
            (Number(equipmentCombatStat.mpRecovery) || 0),
          castSpeed: Number(equipmentCombatStat.castSpeed) || 0,
          attackStartupMs: Math.max(
            0,
            attackTiming.startupMs +
              (Number(equipmentCombatStat.attackStartupMs) || 0),
          ),
          attackActiveMs: Math.max(
            0,
            attackTiming.activeMs +
              (Number(equipmentCombatStat.attackActiveMs) || 0),
          ),
          attackRecoveryMs: Math.max(
            0,
            attackTiming.recoveryMs +
              (Number(equipmentCombatStat.attackRecoveryMs) || 0),
          ),
          attackIntervalMs: Math.max(
            0,
            attackTiming.intervalMs +
              (Number(equipmentCombatStat.attackIntervalMs) || 0),
          ),
        };
      }

      function aggregateSelectedEquipmentCombatStat() {
        const total = {
          physicalAttackMin: 0,
          physicalAttackMax: 0,
          magicAttackMin: 0,
          magicAttackMax: 0,
          physicalDefense: 0,
          magicDefense: 0,
          moveSpeed: 0,
          evasion: 0,
          accuracy: 0,
          critRate: 0,
          critDamage: 0,
          hpRecovery: 0,
          mpRecovery: 0,
          castSpeed: 0,
          attackStartupMs: 0,
          attackActiveMs: 0,
          attackRecoveryMs: 0,
          attackIntervalMs: 0,
        };
        const selectedIDs = new Set();
        for (const slot of equipmentPanelSlots()) {
          const select = document.getElementById("equipment-" + slot);
          if (!select || !select.value || selectedIDs.has(select.value))
            continue;
          selectedIDs.add(select.value);
          const config = equipmentConfigs[select.value];
          const combatStat = (config && config.combatStat) || {};
          for (const key of Object.keys(total)) {
            total[key] += Number(combatStat[key]) || 0;
          }
        }
        return total;
      }

      function calculateAttackTiming(stat, job) {
        const intervalMs = calculateAttackIntervalMs(stat, job);
        const interval = job.attackInterval || {};
        const startupMs = Number(interval.startupMs) || 0;
        const activeMs = Number(interval.activeMs) || 0;
        const recoveryMs = Number(interval.recoveryMs) || 0;
        const baseTotal = startupMs + activeMs + recoveryMs;
        if (baseTotal <= 0) {
          const startup = Math.floor(intervalMs / 4);
          const active = Math.floor(intervalMs / 6);
          return {
            startupMs: startup,
            activeMs: active,
            recoveryMs: intervalMs - startup - active,
            intervalMs,
          };
        }

        const startup = Math.round((intervalMs * startupMs) / baseTotal);
        const active = Math.round((intervalMs * activeMs) / baseTotal);
        return {
          startupMs: startup,
          activeMs: active,
          recoveryMs: Math.max(0, intervalMs - startup - active),
          intervalMs,
        };
      }

      function calculateAttackIntervalMs(stat, job) {
        const interval = job.attackInterval || null;
        if (!interval) return Number(job.attackIntervalMs) || 600;

        const baseMs = Number(interval.baseMs) || 600;
        const minMs = Number(interval.minMs) || 250;
        let maxMs = Number(interval.maxMs) || 1500;
        if (maxMs < minMs) maxMs = minMs;
        const reduction = interval.reduction || {};
        const value = Math.round(
          baseMs -
            (Number(stat.strength) || 0) * (Number(reduction.strength) || 0) -
            (Number(stat.intelligence) || 0) *
              (Number(reduction.intelligence) || 0) -
            (Number(stat.agility) || 0) * (Number(reduction.agility) || 0) -
            (Number(stat.luck) || 0) * (Number(reduction.luck) || 0),
        );
        return Math.max(minMs, Math.min(maxMs, value));
      }

      function calculateAllocatedStat(stat, percent) {
        if (!percent) return 0;
        return Math.round(
          ((Number(stat.strength) || 0) * (Number(percent.strength) || 0)) /
            100 +
            ((Number(stat.intelligence) || 0) *
              (Number(percent.intelligence) || 0)) /
              100 +
            ((Number(stat.agility) || 0) * (Number(percent.agility) || 0)) /
              100 +
            ((Number(stat.luck) || 0) * (Number(percent.luck) || 0)) / 100,
        );
      }

      function calculateAllocatedFloatStat(stat, percent) {
        if (!percent) return 0;
        return roundForDisplay(
          ((Number(stat.strength) || 0) * (Number(percent.strength) || 0)) /
            100 +
            ((Number(stat.intelligence) || 0) *
              (Number(percent.intelligence) || 0)) /
              100 +
            ((Number(stat.agility) || 0) * (Number(percent.agility) || 0)) /
              100 +
            ((Number(stat.luck) || 0) * (Number(percent.luck) || 0)) / 100,
        );
      }

      function formatStatNumber(value) {
        return roundForDisplay(value).toLocaleString(undefined, {
          maximumFractionDigits: 2,
        });
      }

      function roundForDisplay(value) {
        const number = Number(value) || 0;
        return Math.round((number + Number.EPSILON) * 100) / 100;
      }
      function syncPrimaryStatForm() {
        const self = players.get($("player").value.trim());
        const baseStat = self && self.stat ? self.stat.base || self.stat : null;
        if (!baseStat) return;

        for (const key of Object.keys(statInputIds)) {
          const input = $(statInputIds[key]);
          if (document.activeElement === input) continue;
          input.value = baseStat[key] || 0;
        }
      }

      function withDisplayPosition(player) {
        return { ...player, displayX: player.x, displayY: player.y };
      }

      function withDisplayMonster(monster, previous) {
        return {
          ...monster,
          displayX: previous ? previous.displayX : monster.x,
          displayY: previous ? previous.displayY : monster.y,
        };
      }

      function withDisplayProjectile(projectile, previous) {
        return {
          ...projectile,
          displayX: previous ? previous.displayX : projectile.x,
          displayY: previous ? previous.displayY : projectile.y,
        };
      }

      function smoothPlayers(dt) {
        const stiffness = 18;
        const t = 1 - Math.exp(-stiffness * dt);
        for (const player of players.values()) {
          player.displayX += (player.x - player.displayX) * t;
          player.displayY += (player.y - player.displayY) * t;
        }
      }

      function smoothMonsters(dt) {
        const stiffness = 18;
        const t = 1 - Math.exp(-stiffness * dt);
        for (const monster of monsters.values()) {
          monster.displayX += (monster.x - monster.displayX) * t;
          monster.displayY += (monster.y - monster.displayY) * t;
        }
      }

      function smoothProjectiles(dt) {
        const stiffness = 30;
        const t = 1 - Math.exp(-stiffness * dt);
        for (const projectile of projectiles.values()) {
          projectile.displayX += (projectile.x - projectile.displayX) * t;
          projectile.displayY += (projectile.y - projectile.displayY) * t;
        }
      }

      function draw(now = performance.now()) {
        const dt = Math.min((now - lastFrameAt) / 1000, 0.05);
        lastFrameAt = now;
        smoothPlayers(dt);
        smoothMonsters(dt);
        smoothProjectiles(dt);

        const scale = Math.min(
          canvas.width / world.width,
          canvas.height / world.height,
        );
        const offsetX = (canvas.width - world.width * scale) / 2;
        const offsetY = (canvas.height - world.height * scale) / 2;

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#dfeee4";
        ctx.fillRect(
          offsetX,
          offsetY,
          world.width * scale,
          world.height * scale,
        );
        ctx.strokeStyle = "#6f9b7e";
        ctx.lineWidth = 2;
        ctx.strokeRect(
          offsetX,
          offsetY,
          world.width * scale,
          world.height * scale,
        );

        if (typeof world.groundY === "number") {
          const groundY = offsetY + world.groundY * scale;
          ctx.fillStyle = "#7c8f65";
          ctx.fillRect(offsetX, groundY, world.width * scale, 10);
        }

        if (Array.isArray(world.terrain)) {
          ctx.strokeStyle = "#3f7d4a";
          ctx.lineWidth = Math.max(3, 5 * scale);
          ctx.lineCap = "round";
          for (const terrain of world.terrain) {
            const points = terrainPoints(terrain);
            if (points.length < 2) continue;
            ctx.beginPath();
            ctx.moveTo(
              offsetX + points[0].x * scale,
              offsetY + points[0].y * scale,
            );
            for (let i = 1; i < points.length; i++) {
              ctx.lineTo(
                offsetX + points[i].x * scale,
                offsetY + points[i].y * scale,
              );
            }
            ctx.stroke();
          }
          ctx.lineCap = "butt";
        }

        if (Array.isArray(world.polygons)) {
          for (const polygon of world.polygons) {
            drawPolygon(polygon, offsetX, offsetY, scale);
          }
        }
        if (Array.isArray(world.platforms)) {
          for (const platform of world.platforms) {
            ctx.fillStyle = "#8d9468";
            ctx.fillRect(
              offsetX + platform.x * scale,
              offsetY + platform.y * scale,
              platform.width * scale,
              platform.height * scale,
            );
            ctx.strokeStyle = "#5f6843";
            ctx.strokeRect(
              offsetX + platform.x * scale,
              offsetY + platform.y * scale,
              platform.width * scale,
              platform.height * scale,
            );
          }
        }

        if (Array.isArray(world.walls)) {
          for (const wall of world.walls) {
            ctx.fillStyle = "#5c6370";
            ctx.fillRect(
              offsetX + wall.x * scale,
              offsetY + wall.y * scale,
              wall.width * scale,
              wall.height * scale,
            );
            ctx.strokeStyle = "#303642";
            ctx.strokeRect(
              offsetX + wall.x * scale,
              offsetY + wall.y * scale,
              wall.width * scale,
              wall.height * scale,
            );
          }
        }

        if (Array.isArray(world.ladders)) {
          for (const ladder of world.ladders) {
            const x = offsetX + ladder.x * scale;
            const y = offsetY + ladder.y * scale;
            const width = ladder.width * scale;
            const height = ladder.height * scale;
            ctx.fillStyle = "rgba(194, 120, 61, 0.18)";
            ctx.fillRect(x, y, width, height);
            ctx.strokeStyle = "#9a5d23";
            ctx.strokeRect(x, y, width, height);
            const rungCount = Math.max(2, Math.floor(ladder.height / 42));
            for (let i = 0; i <= rungCount; i++) {
              const rungY = y + (height * i) / rungCount;
              ctx.beginPath();
              ctx.moveTo(x, rungY);
              ctx.lineTo(x + width, rungY);
              ctx.stroke();
            }
          }
        }

        if (Array.isArray(world.portals)) {
          for (const portal of world.portals) {
            const area = portal.area;
            ctx.fillStyle = "rgba(226, 61, 77, 0.18)";
            ctx.fillRect(
              offsetX + area.x * scale,
              offsetY + area.y * scale,
              area.width * scale,
              area.height * scale,
            );
            ctx.strokeStyle = "#e23d4d";
            ctx.strokeRect(
              offsetX + area.x * scale,
              offsetY + area.y * scale,
              area.width * scale,
              area.height * scale,
            );
          }
        }

        drawLootDrops(offsetX, offsetY, scale);
        drawAttackAreas(offsetX, offsetY, scale);
        drawProjectiles(offsetX, offsetY, scale);
        for (const monster of monsters.values()) {
          if (monster.alive === false) continue;
          const x = offsetX + monster.displayX * scale;
          const y = offsetY + monster.displayY * scale;
          const width = (monster.width || 72) * scale;
          const height = (monster.height || 56) * scale;

          ctx.fillStyle = "#22c55e";
          ctx.fillRect(x - width / 2, y - height, width, height);
          ctx.strokeStyle = "#166534";
          ctx.strokeRect(x - width / 2, y - height, width, height);

          ctx.fillStyle = "#172033";
          ctx.font = "12px system-ui";
          ctx.fillText(`${monster.name || monster.monsterId} ${monster.hp}/${monster.hpMax}`, x + width / 2 + 6, y - height + 12);
        }

        for (const player of players.values()) {
          const x = offsetX + player.displayX * scale;
          const y = offsetY + player.displayY * scale;
          const self = player.id === $("player").value.trim();
          const width = (player.width || 52) * scale;
          const height = (player.height || 96) * scale;

          ctx.fillStyle = self ? "#e23d4d" : "#2c6eea";
          ctx.fillRect(x - width / 2, y - height, width, height);
          ctx.strokeStyle = self ? "#8f1f2a" : "#174899";
          ctx.strokeRect(x - width / 2, y - height, width, height);

          ctx.fillStyle = "#172033";
          ctx.font = "13px system-ui";
          ctx.fillText(
            player.name || player.id,
            x + width / 2 + 6,
            y - height + 12,
          );
        }

        drawDamageTexts(offsetX, offsetY, scale);
        requestAnimationFrame(draw);
      }

      function drawPolygon(polygon, offsetX, offsetY, scale) {
        const points = Array.isArray(polygon.points) ? polygon.points : [];
        if (points.length < 3) return;

        const lineWidth = Math.max(2, 4 * scale);
        ctx.beginPath();
        ctx.moveTo(
          offsetX + points[0].x * scale,
          offsetY + points[0].y * scale,
        );
        for (let i = 1; i < points.length; i++) {
          ctx.lineTo(
            offsetX + points[i].x * scale,
            offsetY + points[i].y * scale,
          );
        }
        ctx.closePath();
        ctx.fillStyle = "rgba(34, 197, 94, 0.24)";
        ctx.fill();
        ctx.strokeStyle = "#15803d";
        ctx.lineWidth = lineWidth;
        ctx.stroke();

        ctx.fillStyle = "#166534";
        for (const point of points) {
          ctx.beginPath();
          ctx.arc(
            offsetX + point.x * scale,
            offsetY + point.y * scale,
            Math.max(3, 5 * scale),
            0,
            Math.PI * 2,
          );
          ctx.fill();
        }
      }
      function terrainPoints(terrain) {
        if (Array.isArray(terrain.points) && terrain.points.length > 0) {
          return terrain.points;
        }
        return [
          { x: terrain.x1 || 0, y: terrain.y1 || 0 },
          { x: terrain.x2 || 0, y: terrain.y2 || 0 },
        ];
      }
      function drawLootDrops(offsetX, offsetY, scale) {
        for (const drop of lootDrops.values()) {
          const x = offsetX + drop.x * scale;
          const y = offsetY + drop.y * scale;
          const width = (drop.width || 34) * scale;
          const height = (drop.height || 24) * scale;

          ctx.fillStyle = "rgba(245, 158, 11, 0.22)";
          ctx.fillRect(x - width / 2, y - height, width, height);
          ctx.strokeStyle = "#f59e0b";
          ctx.lineWidth = 2;
          ctx.strokeRect(x - width / 2, y - height, width, height);

          ctx.fillStyle = "#172033";
          ctx.font = "12px system-ui";
          ctx.fillText(drop.name || drop.equipmentId || drop.id, x + width / 2 + 6, y - height + 12);
        }
      }

      function drawProjectiles(offsetX, offsetY, scale) {
        for (const projectile of projectiles.values()) {
          ctx.fillStyle = "rgba(88, 80, 236, 0.22)";
          ctx.fillRect(
            offsetX + projectile.displayX * scale,
            offsetY + projectile.displayY * scale,
            projectile.width * scale,
            projectile.height * scale,
          );
          ctx.strokeStyle = "#5850ec";
          ctx.lineWidth = 2;
          ctx.strokeRect(
            offsetX + projectile.displayX * scale,
            offsetY + projectile.displayY * scale,
            projectile.width * scale,
            projectile.height * scale,
          );
        }
      }

      function drawDamageTexts(offsetX, offsetY, scale) {
        const now = performance.now();
        while (damageTexts.length > 0 && damageTexts[0].expiresAt <= now) {
          damageTexts.shift();
        }

        ctx.save();
        ctx.textAlign = "center";
        ctx.font = "bold 18px system-ui";
        for (const text of damageTexts) {
          const age = now - text.createdAt;
          const life = Math.max(1, text.expiresAt - text.createdAt);
          const progress = Math.max(0, Math.min(1, age / life));
          const x = offsetX + text.x * scale;
          const y = offsetY + text.y * scale - progress * 30;

          ctx.globalAlpha = 1 - progress;
          ctx.lineWidth = 4;
          ctx.strokeStyle = text.stroke;
          ctx.strokeText(text.label, x, y);
          ctx.fillStyle = text.color;
          ctx.fillText(text.label, x, y);
        }
        ctx.restore();
      }

      function drawAttackAreas(offsetX, offsetY, scale) {
        const now = performance.now();
        while (attacks.length > 0 && attacks[0].expiresAt <= now) {
          attacks.shift();
        }

        for (const attack of attacks) {
          const area = attack.area;
          if (!area) continue;

          ctx.fillStyle = attack.targetId
            ? attack.isSkill
              ? "rgba(88, 80, 236, 0.22)"
              : "rgba(226, 61, 77, 0.22)"
            : "rgba(44, 110, 234, 0.14)";
          ctx.fillRect(
            offsetX + area.x * scale,
            offsetY + area.y * scale,
            area.width * scale,
            area.height * scale,
          );
          ctx.strokeStyle = attack.isSkill
            ? "#5850ec"
            : attack.targetId
              ? "#e23d4d"
              : "#2c6eea";
          ctx.lineWidth = 2;
          ctx.strokeRect(
            offsetX + area.x * scale,
            offsetY + area.y * scale,
            area.width * scale,
            area.height * scale,
          );
        }
      }

      function renderSelfHud() {
        const self = players.get($("player").value.trim());
        const hudLines = $("hud-lines");
        const hpText = $("hud-hp-text");
        const mpText = $("hud-mp-text");
        const hpFill = $("hud-hp-fill");
        const mpFill = $("hud-mp-fill");
        if (!hudLines || !hpText || !mpText || !hpFill || !mpFill) return;

        if (!self || !self.stat) {
          hudLines.innerHTML = "<div>Not connected</div>";
          hpText.textContent = "0 / 0";
          mpText.textContent = "0 / 0";
          hpFill.style.width = "0%";
          mpFill.style.width = "0%";
          return;
        }

        const combat = self.combatStat || {};
        const finalStat = self.stat.final || self.stat;
        const hp = Math.max(0, Number(finalStat.hp) || 0);
        const hpMax = Math.max(1, Number(finalStat.hpMax) || 1);
        const mp = Math.max(0, Number(finalStat.mp) || 0);
        const mpMax = Math.max(1, Number(finalStat.mpMax) || 1);

        hudLines.innerHTML = `
          <div>Lv ${self.level || 1}  EXP ${self.exp || "0"}</div>
          <div>STR ${finalStat.strength || 0}   INT ${finalStat.intelligence || 0}</div>
          <div>AGI ${finalStat.agility || 0}   LUK ${finalStat.luck || 0}</div>
          <div>PATK ${combat.physicalAttackMin || 0}-${combat.physicalAttackMax || 0}   MATK ${combat.magicAttackMin || 0}-${combat.magicAttackMax || 0}</div>
          <div>PDEF ${combat.physicalDefense || 0}   MDEF ${combat.magicDefense || 0}</div>
          <div>SPD ${combat.moveSpeed || 0}   EVA ${combat.evasion || 0}   ACC ${combat.accuracy || 0}</div>
          <div>CRIT ${combat.critRate || 0}   CDMG ${combat.critDamage || 0}</div>
          <div>CAST ${combat.castSpeed || 0}   REC HP ${formatStatNumber(combat.hpRecovery)}/s   MP ${formatStatNumber(combat.mpRecovery)}/s</div>
          <div>ATK ${combat.attackStartupMs || 0}+${combat.attackActiveMs || 0}+${combat.attackRecoveryMs || 0}=${combat.attackIntervalMs || 0}ms</div>
        `;

        hpText.textContent = `${hp} / ${hpMax}`;
        mpText.textContent = `${mp} / ${mpMax}`;
        hpFill.style.width = `${Math.max(0, Math.min(100, (hp / hpMax) * 100))}%`;
        mpFill.style.width = `${Math.max(0, Math.min(100, (mp / mpMax) * 100))}%`;
      }

      $("connect").addEventListener("click", connect);
      $("disconnect").addEventListener("click", disconnect);
      for (const id of Object.values(statInputIds)) {
        $(id).addEventListener("input", sendPrimaryStat);
      }
      loadRooms();
      loadJobStats();
      loadEquipmentStats();
      renderSelfHud();

      window.addEventListener("keydown", (event) => {
        if (
          event.target instanceof HTMLInputElement ||
          event.target instanceof HTMLSelectElement
        ) {
          return;
        }

        if (event.key === "ArrowUp") {
          event.preventDefault();
          const self = players.get($("player").value.trim());
          if (!pressedKeys.has(event.key) && !(self && self.onLadder))
            usePortal();
          pressedKeys.add(event.key);
          return;
        }

        if (event.key === "c" || event.key === "C") {
          event.preventDefault();
          if (!pressedKeys.has("KeyC")) {
            if (pressedKeys.has("ArrowDown")) drop();
            else jump();
          }
          pressedKeys.add("KeyC");
          return;
        }

        if (event.key === "x" || event.key === "X") {
          event.preventDefault();
          if (!pressedKeys.has("KeyX")) normalAttack();
          pressedKeys.add("KeyX");
          return;
        }

        if (event.key === "z" || event.key === "Z") {
          event.preventDefault();
          if (!pressedKeys.has("KeyZ")) castMagicMissile();
          pressedKeys.add("KeyZ");
          return;
        }

        if (event.key === "v" || event.key === "V") {
          event.preventDefault();
          if (!pressedKeys.has("KeyV")) pickupLoot();
          pressedKeys.add("KeyV");
          return;
        }

        if (
          event.key !== "ArrowLeft" &&
          event.key !== "ArrowRight" &&
          event.key !== "ArrowDown"
        ) {
          return;
        }

        event.preventDefault();
        pressedKeys.add(event.key);
      });

      window.addEventListener("keyup", (event) => {
        pressedKeys.delete(event.key);
        if (event.key === "c" || event.key === "C") pressedKeys.delete("KeyC");
        if (event.key === "x" || event.key === "X") pressedKeys.delete("KeyX");
        if (event.key === "z" || event.key === "Z") pressedKeys.delete("KeyZ");
        if (event.key === "v" || event.key === "V") pressedKeys.delete("KeyV");
      });

      function controlLoop(now) {
        let inputX = 0;
        let inputY = 0;
        if (pressedKeys.has("ArrowLeft")) inputX -= 1;
        if (pressedKeys.has("ArrowRight")) inputX += 1;
        if (pressedKeys.has("ArrowUp")) inputY -= 1;
        if (pressedKeys.has("ArrowDown")) inputY += 1;
        sendInput(inputX, inputY);
        requestAnimationFrame(controlLoop);
      }

      requestAnimationFrame(controlLoop);

      requestAnimationFrame(draw);
    </script>
  </body>
</html>
