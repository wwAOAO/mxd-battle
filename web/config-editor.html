<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MXD Config Editor</title>
    <style>
      * {
        box-sizing: border-box;
      }

      :root {
        --ui-font-family:
          "PingFang SC",
          "Microsoft YaHei",
          "Noto Sans SC",
          "Helvetica Neue",
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      html,
      body {
        height: 100%;
        margin: 0;
        overflow: hidden;
        font-family: var(--ui-font-family);
        color: #1f2937;
        background: #eef2f6;
      }

      main {
        display: grid;
        grid-template-columns: 320px minmax(0, 1fr);
        height: 100vh;
        min-height: 0;
      }

      aside {
        display: grid;
        grid-template-rows: auto auto minmax(0, 1fr);
        gap: 12px;
        min-height: 0;
        padding: 16px;
        border-right: 1px solid #d5dde8;
        background: #ffffff;
      }

      .editor {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr) auto;
        gap: 12px;
        min-height: 0;
        padding: 16px;
      }

      * {
        font-family: inherit;
      }

      h1,
      h2,
      h3 {
        margin: 0;
        line-height: 1.2;
      }

      h1 {
        font-size: 20px;
      }

      h2 {
        color: #526174;
        font-size: 13px;
        text-transform: uppercase;
      }

      h3 {
        color: #253149;
        font-size: 15px;
        font-weight: 600;
      }

      button,
      select,
      input {
        width: 100%;
        min-width: 0;
        border: 1px solid #c8d2df;
        border-radius: 6px;
        font-family: var(--ui-font-family);
        font-size: 14px;
        font-weight: 400;
        line-height: 1.6;
        background: #ffffff;
      }

      button,
      select,
      input {
        min-height: 36px;
        padding: 7px 10px;
      }

      button {
        cursor: pointer;
        color: #ffffff;
        border-color: #2d6cdf;
        background: #2d6cdf;
        font-weight: 800;
      }

      button.secondary {
        color: #253149;
        border-color: #c8d2df;
        background: #edf2f8;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      .panel {
        display: grid;
        gap: 10px;
        min-width: 0;
        padding: 12px;
        border: 1px solid #d8e0ea;
        border-radius: 8px;
        background: #fbfcfe;
      }

      .file-panel {
        grid-template-rows: auto minmax(0, 1fr);
        align-content: stretch;
      }

      .file-list {
        display: grid;
        align-content: start;
        gap: 4px;
        min-height: 0;
        overflow: auto;
      }

      .file-item {
        display: grid;
        grid-template-columns: minmax(72px, 0.65fr) minmax(0, 1fr);
        gap: 8px;
        align-items: center;
        min-height: 34px;
        padding: 6px 8px;
        border: 1px solid #d8e0ea;
        border-radius: 6px;
        background: #f8fafc;
        cursor: pointer;
      }

      .file-item.active {
        border-color: #2d6cdf;
        background: #eaf1ff;
      }

      .status,
      .current-file,
      .field-path {
        overflow-wrap: anywhere;
      }

      .file-item strong,
      .file-item span {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .file-item strong {
        color: #253149;
        font-size: 13px;
      }

      .file-item span,
      .field-path,
      .field-help {
        color: #64748b;
        font-family: var(--ui-font-family);
        font-size: 12px;
        font-weight: 400;
        line-height: 1.5;
      }

      .toolbar {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 150px;
        gap: 8px;
        align-items: center;
      }

      .current-file {
        color: #253149;
        font-size: 13px;
        font-weight: 800;
      }

      .form-root {
        display: grid;
        gap: 12px;
        min-height: 0;
        overflow: auto;
        padding-right: 4px;
      }

      .group {
        display: grid;
        gap: 10px;
        padding: 12px;
        border: 1px solid #d8e0ea;
        border-radius: 8px;
        background: #ffffff;
      }

      .group-header {
        display: grid;
        gap: 4px;
        padding-bottom: 6px;
        border-bottom: 1px solid #edf1f6;
      }

      .field-row {
        display: grid;
        grid-template-columns: minmax(160px, 240px) minmax(0, 1fr);
        gap: 10px;
        align-items: start;
      }

      .group.compact-fields {
        grid-template-columns: repeat(auto-fill, minmax(148px, 156px));
        gap: 6px;
        justify-content: start;
      }

      .group.compact-fields > .group-header,
      .group.compact-fields > .group {
        grid-column: 1 / -1;
      }

      .group.compact-fields > .field-row {
        grid-template-columns: 1fr;
        gap: 3px;
        padding: 5px 7px;
        border: 1px solid #edf1f6;
        border-radius: 6px;
        background: #fbfcfe;
      }

      .group.compact-fields > .field-row.select-row {
        grid-column: span 2;
      }

      .group.compact-fields .field-label {
        padding-top: 0;
      }

      .group.compact-fields .field-path {
        display: none;
      }

      .group.compact-fields input,
      .group.compact-fields select {
        min-height: 30px;
        padding: 4px 8px;
      }


      .form-root.job-skills-form > .group {
        gap: 8px;
        padding: 10px;
      }

      .form-root.job-skills-form .group.compact-fields {
        align-items: start;
        grid-auto-rows: min-content;
      }

      .form-root.job-skills-form .group.compact-fields > .field-row {
        align-self: start;
        min-height: 0;
      }

      .form-root.job-skills-form > .group.compact-fields > .field-row {
        padding: 4px 6px;
      }

      .form-root.job-skills-form .group.compact-fields > .group {
        gap: 8px;
        padding: 10px;
      }

      .form-root.job-skills-form .group.compact-fields input,
      .form-root.job-skills-form .group.compact-fields select {
        min-height: 28px;
        padding: 3px 7px;
      }
      .field-label {
        display: grid;
        gap: 3px;
        min-width: 0;
        padding-top: 6px;
      }

      .field-name {
        display: inline-flex;
        align-items: center;
        flex-wrap: nowrap;
        gap: 6px;
        color: #253149;
        font-family: var(--ui-font-family);
        font-size: 14px;
        font-weight: 500;
        line-height: 1.5;
        white-space: nowrap;
      }

      .field-help-icon {
        position: relative;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 16px;
        height: 16px;
        border: 1px solid #bfd0ea;
        border-radius: 999px;
        color: #5f7ea7;
        background: #f4f8ff;
        font-size: 11px;
        font-weight: 700;
        line-height: 1;
        cursor: help;
      }

      .field-help-icon::after {
        content: attr(data-tip);
        position: absolute;
        left: 50%;
        bottom: calc(100% + 8px);
        transform: translateX(-50%);
        z-index: 30;
        display: none;
        min-width: 180px;
        max-width: 240px;
        padding: 8px 10px;
        border-radius: 8px;
        color: #ffffff;
        background: rgba(23, 37, 84, 0.94);
        box-shadow: 0 10px 28px rgba(15, 23, 42, 0.2);
        font-size: 12px;
        font-weight: 400;
        line-height: 1.45;
        text-align: left;
        white-space: normal;
        pointer-events: none;
      }

      .field-help-icon:hover::after {
        display: block;
      }

      .field-control {
        display: grid;
        gap: 5px;
        min-width: 0;
      }

      .multi-select {
        position: relative;
      }

      .multi-select-trigger {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        width: 100%;
        min-width: 0;
        min-height: 36px;
        padding: 7px 10px;
        border: 1px solid #c8d2df;
        border-radius: 6px;
        color: #253149;
        background: #ffffff;
        cursor: pointer;
        font-family: var(--ui-font-family);
        font-size: 14px;
        font-weight: 400;
        line-height: 1.6;
      }

      .multi-select.open .multi-select-trigger {
        border-color: #2d6cdf;
        box-shadow: 0 0 0 2px rgba(45, 108, 223, 0.12);
      }

      .multi-select-value {
        min-width: 0;
        overflow: hidden;
        color: #253149;
        font-family: var(--ui-font-family);
        font-size: 14px;
        font-weight: 400;
        line-height: 1.6;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .multi-select-value.placeholder {
        color: #94a3b8;
      }

      .multi-select-arrow {
        flex: 0 0 auto;
        color: #64748b;
        font-size: 12px;
        transition: transform 0.18s ease;
      }

      .multi-select.open .multi-select-arrow {
        transform: rotate(180deg);
      }

      .multi-select-menu {
        position: absolute;
        top: calc(100% + 6px);
        left: 0;
        right: 0;
        z-index: 20;
        display: none;
        max-height: 240px;
        overflow: auto;
        padding: 6px 0;
        border: 1px solid #d8e0ea;
        border-radius: 8px;
        background: #ffffff;
        box-shadow: 0 12px 28px rgba(15, 23, 42, 0.12);
        font-family: inherit;
      }

      .multi-select.open .multi-select-menu {
        display: block;
      }

      .multi-select-option {
        display: flex;
        align-items: center;
        gap: 10px;
        width: 100%;
        padding: 8px 10px;
        border: 0;
        border-radius: 0;
        color: #253149;
        background: transparent;
        cursor: pointer;
        text-align: left;
        font-family: inherit;
        font-size: 14px;
        font-weight: 400;
        line-height: 1.6;
      }

      .multi-select-option:hover {
        background: #f8fafc;
      }

      .multi-select-option input {
        width: 16px;
        height: 16px;
        min-height: 16px;
        margin: 0;
        padding: 0;
      }

      .multi-select-option span {
        min-width: 0;
        color: #253149;
        font-family: inherit;
        font-size: 14px;
        font-weight: 400;
        line-height: 1.6;
        overflow-wrap: anywhere;
      }

      .status {
        min-height: 38px;
        padding: 10px;
        border: 1px solid #d8e0ea;
        border-radius: 6px;
        color: #526174;
        background: #fbfcfe;
        font-size: 13px;
        line-height: 1.4;
      }

      @media (max-width: 860px) {
        main {
          grid-template-columns: 1fr;
          grid-template-rows: 42vh minmax(0, 1fr);
        }

        aside {
          border-right: 0;
          border-bottom: 1px solid #d5dde8;
        }

        .toolbar,
        .field-row {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <aside>
        <h1>MXD 配置编辑器</h1>
        <div class="panel">
          <h2>配置类型</h2>
          <select id="category">
            <option value="equipment">装备配置</option>
            <option value="job_stats">职业属性配置</option>
            <option value="job_skills">职业技能配置</option>
          </select>
          <button id="reloadFiles" class="secondary">重新读取文件</button>
          <button id="newConfig">新增配置</button>
        </div>
        <div class="panel file-panel">
          <h2>配置文件</h2>
          <div id="fileList" class="file-list"></div>
        </div>
      </aside>

      <section class="editor">
        <div class="toolbar">
          <div id="currentFile" class="current-file">请选择一个配置文件</div>
          <button id="save" disabled>保存到文件</button>
        </div>
        <div id="formRoot" class="form-root">
          <div class="status">请选择左侧配置文件。</div>
        </div>
        <div id="status" class="status">Ready.</div>
      </section>
    </main>

    <script>
      const $ = (id) => document.getElementById(id);
      let files = [];
      let selectedFile = null;
      let currentConfig = null;
      let configTemplates = {};
      let jobOptions = [];
      let equipmentIDOptions = [];
      let equipmentExclusiveGroupOptions = [];
      const equipmentSlotOptions = ["weapon_main", "weapon_sub", "armor", "shoes", "ring", "accessory"];
      const occupySlotOptions = ["weapon_main", "weapon_sub", "armor", "shoes", "accessory", "ring1", "ring2"];
      const equipmentSlotLabels = {
        weapon_main: "\u4e3b\u624b\u6b66\u5668",
        weapon_sub: "\u526f\u624b\u6b66\u5668",
        armor: "\u4e0a\u8863",
        shoes: "\u978b\u5b50",
        ring: "\u6212\u6307",
        accessory: "\u9970\u54c1",
        ring1: "\u6212\u63071",
        ring2: "\u6212\u63072",
      };
      const genderLabels = {
        male: "\u7537",
        female: "\u5973",
      };
      const fieldControls = new Map();

      const labels = {
        id: "配置ID",
        name: "名称",
        slot: "装备部位",
        slotCount: "占用格数",
        occupiesSlots: "占用装备栏",
        stat: "基础属性加成",
        combatStat: "战斗属性加成",
        requirement: "穿戴属性要求",
        minLevel: "最低等级",
        allowedJobs: "\u5141\u8bb8\u804c\u4e1a",
        allowedGenders: "\u5141\u8bb8\u6027\u522b",
        exclusiveGroup: "互斥组",
        incompatibleWith: "不兼容装备",
        strength: "力量 STR",
        intelligence: "智力 INT",
        agility: "敏捷 AGI",
        luck: "幸运 LUK",
        hp: "当前生命值 HP",
        mp: "当前魔法值 MP",
        hpMax: "最大生命值 HPMax",
        mpMax: "最大魔法值 MPMax",
        physicalAttackMin: "最小物理攻击力",
        physicalAttackMax: "最大物理攻击力",
        magicAttackMin: "最小魔法攻击力",
        magicAttackMax: "最大魔法攻击力",
        physicalDefense: "物理防御力",
        magicDefense: "魔法防御力",
        moveSpeed: "移动速度",
        evasion: "回避率",
        accuracy: "命中率",
        critRate: "暴击率",
        critDamage: "暴击伤害",
        hpRecovery: "生命自动恢复",
        mpRecovery: "魔法自动恢复",
        castSpeed: "释放速度",
        attackStartupMs: "攻击前摇毫秒",
        attackActiveMs: "攻击有效毫秒",
        attackRecoveryMs: "攻击后摇毫秒",
        attackIntervalMs: "攻击间隔毫秒",
        attackInterval: "普通攻击节奏配置",
        baseMs: "基础间隔毫秒",
        minMs: "最小间隔毫秒",
        maxMs: "最大间隔毫秒",
        startupMs: "前摇毫秒",
        activeMs: "有效时间毫秒",
        recoveryMs: "后摇毫秒",
        reduction: "属性减少间隔",
        allocation: "属性百分比分配",
        mpCost: "消耗MP",
        cooldownMs: "冷却毫秒",
        range: "技能范围",
        width: "宽度",
        height: "高度",
        projectile: "飞行物配置",
        speed: "飞行速度",
        maxDistance: "最大飞行距离",
        damage: "伤害配置",
        base: "基础伤害",
        magicRate: "魔法攻击倍率",
      };

      const helpText = {
        slot: "不选表示不限制。",
        allowedJobs: "不选表示不限制。",
        allowedGenders: "不选表示不限制。",
        occupiesSlots: "不选表示不限制。",
        incompatibleWith: "不选表示不限制。",
        exclusiveGroup: "不选表示不限制。",
        allocation: "职业属性分配填写百分比，100 表示该主属性的 100%。",
        reduction: "每 1 点主属性减少多少毫秒，不是百分比。",
        attackStartupMs: "负数表示装备让前摇变短。",
        attackRecoveryMs: "负数表示装备让后摇变短。",
        attackIntervalMs: "负数表示装备让总攻击间隔变短。",
        castSpeed: "数值越大，技能释放总时间越短。",
      };

      async function loadTemplates() {
        const response = await fetch("/config-templates");
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const payload = await response.json();
        configTemplates = payload.templates || {};
      }

      function setStatus(text) {
        $("status").textContent = text;
      }

      function selectedCategory() {
        return $("category").value;
      }

      function configFileURL(file) {
        return `/config-files/${encodeURIComponent(file.category)}/${encodeURI(file.path)}`;
      }

      function defaultNewConfigPath(category, id) {
        const safeID = sanitizeFilePart(id || "new_config");
        if (category === "equipment") return `custom/${safeID}.json`;
        if (category === "job_stats") return `${safeID}.json`;
        if (category === "job_skills") return `custom/${safeID}.json`;
        return `${safeID}.json`;
      }

      function extractEquipmentIDs(value) {
        const ids = [];
        if (isEquipmentGroup(value)) {
          for (const item of Object.values(value)) {
            if (isPlainObject(item) && typeof item.id === "string" && item.id.trim()) ids.push(item.id.trim());
          }
          return ids;
        }
        if (isPlainObject(value) && typeof value.id === "string" && value.id.trim()) ids.push(value.id.trim());
        return ids;
      }

      function extractEquipmentExclusiveGroups(value) {
        const groups = [];
        if (isEquipmentGroup(value)) {
          for (const item of Object.values(value)) {
            if (isPlainObject(item) && typeof item.exclusiveGroup === "string" && item.exclusiveGroup.trim()) groups.push(item.exclusiveGroup.trim());
          }
          return groups;
        }
        if (isPlainObject(value) && typeof value.exclusiveGroup === "string" && value.exclusiveGroup.trim()) groups.push(value.exclusiveGroup.trim());
        return groups;
      }

      async function loadEquipmentOptions() {
        const equipmentFiles = files.filter((file) => file.category === "equipment");
        const optionSet = new Set();
        const exclusiveGroupSet = new Set();
        await Promise.all(
          equipmentFiles.map(async (file) => {
            try {
              const response = await fetch(configFileURL(file));
              if (!response.ok) return;
              const payload = await response.json();
              for (const id of extractEquipmentIDs(payload)) optionSet.add(id);
              for (const group of extractEquipmentExclusiveGroups(payload)) exclusiveGroupSet.add(group);
            } catch (_error) {}
          }),
        );
        equipmentIDOptions = Array.from(optionSet).sort();
        equipmentExclusiveGroupOptions = Array.from(exclusiveGroupSet).sort();
      }

      function sanitizeFilePart(value) {
        return String(value || "")
          .trim()
          .replace(/\\/g, "/")
          .replace(/^\/+/, "")
          .replace(/\.\./g, "")
          .replace(/[^a-zA-Z0-9_\-/]/g, "_");
      }

      async function createNewConfig() {
        const category = selectedCategory();
        const template = configTemplates[category];
        if (!template) {
          setStatus("当前配置类型没有默认模板，不能新增。");
          return;
        }
        const id = window.prompt("请输入配置 ID，例如 bronze_sword / warrior / fireball", "new_config");
        if (!id) return;
        const defaultPath = defaultNewConfigPath(category, id);
        const inputPath = window.prompt("请输入保存路径：", defaultPath);
        if (!inputPath) return;
        const cleanPath = sanitizeFilePart(inputPath.endsWith(".json") ? inputPath : `${inputPath}.json`);
        if (!cleanPath) return;

        const nextFile = {
          category,
          name: cleanPath.split("/").pop().replace(/\.json$/, ""),
          path: cleanPath,
        };
        const nextConfig = structuredClone(template);
        if (isPlainObject(nextConfig) && "id" in nextConfig) nextConfig.id = id;
        if (isPlainObject(nextConfig) && "name" in nextConfig && !nextConfig.name) nextConfig.name = id;

        setStatus(`Creating ${category}/${cleanPath}...`);
        try {
          const response = await fetch(configFileURL(nextFile), {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(nextConfig, null, 2),
          });
          let result = {};
          try {
            result = await response.json();
          } catch (_error) {}
          if (!response.ok) throw new Error(result.error || `HTTP ${response.status}`);
          files = files.filter(
            (file) => !(file.category === nextFile.category && file.path === nextFile.path),
          );
          files.push(nextFile);
          files.sort((a, b) =>
            a.category === b.category
              ? a.path.localeCompare(b.path)
              : a.category.localeCompare(b.category),
          );
          renderFileList();
          await loadConfigFile(nextFile);
          setStatus(`Created ${category}/${cleanPath}.`);
        } catch (error) {
          setStatus(`Create failed: ${error.message}`);
        }
      }

      async function loadFiles() {
        selectedFile = null;
        currentConfig = null;
        fieldControls.clear();
        $("save").disabled = true;
        $("currentFile").textContent = "请选择一个配置文件";
        $("formRoot").innerHTML = '<div class="status">正在读取文件列表...</div>';
        setStatus("Loading files...");

        try {
          const response = await fetch("/config-files");
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          const payload = await response.json();
          files = Array.isArray(payload.files) ? payload.files : [];
          await loadEquipmentOptions();
          jobOptions = files
            .filter((file) => file.category === "job_stats")
            .map((file) => file.path.replace(/\.json$/, "").split("/").pop())
            .filter(Boolean)
            .sort();
          renderFileList();
          setStatus(`Loaded ${files.length} config file(s).`);
          $("formRoot").innerHTML = '<div class="status">请选择左侧配置文件。</div>';
        } catch (error) {
          files = [];
          renderFileList();
          setStatus(`Failed to load files: ${error.message}`);
        }
      }

      function renderFileList() {
        const list = $("fileList");
        list.textContent = "";
        const visibleFiles = files.filter((file) => file.category === selectedCategory());
        if (visibleFiles.length === 0) {
          const empty = document.createElement("div");
          empty.className = "status";
          empty.textContent = "没有配置文件。";
          list.appendChild(empty);
          return;
        }

        for (const file of visibleFiles) {
          const item = document.createElement("div");
          item.className =
            "file-item" +
            (selectedFile && selectedFile.category === file.category && selectedFile.path === file.path
              ? " active"
              : "");
          item.innerHTML = `<strong>${file.name}</strong><span>${file.path}</span>`;
          item.addEventListener("click", () => loadConfigFile(file));
          list.appendChild(item);
        }
      }

      async function loadConfigFile(file) {
        setStatus(`Loading ${file.category}/${file.path}...`);
        try {
          const response = await fetch(configFileURL(file));
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          currentConfig = applyTemplate(file.category, await response.json());
          selectedFile = file;
          $("currentFile").textContent = `${file.category}/${file.path}`;
          $("save").disabled = false;
          renderFileList();
          renderForm(currentConfig);
          setStatus(`Loaded ${file.category}/${file.path}.`);
        } catch (error) {
          setStatus(`Failed to load ${file.path}: ${error.message}`);
        }
      }

      function renderForm(config) {
        fieldControls.clear();
        const root = $("formRoot");
        root.textContent = "";
        root.className = "form-root" + (selectedFile && selectedFile.category === "job_skills" ? " job-skills-form" : "");
        renderValue(root, [], config, "root");
      }

      function applyTemplate(category, value) {
        const template = configTemplates[category];
        if (!template) return value;
        if (category === "equipment" && isEquipmentGroup(value)) {
          const result = {};
          for (const key of Object.keys(value)) {
            result[key] = mergeTemplate(template, value[key] || {});
          }
          return result;
        }
        return mergeTemplate(template, value || {});
      }

      function isEquipmentGroup(value) {
        if (!isPlainObject(value)) return false;
        if ("slot" in value || "stat" in value || "combatStat" in value || "requirement" in value) return false;
        return Object.values(value).some((item) => isPlainObject(item));
      }

      function mergeTemplate(template, value) {
        if (Array.isArray(template)) return Array.isArray(value) ? value : [...template];
        if (!isPlainObject(template)) return value === undefined ? template : value;
        const result = {};
        for (const key of Object.keys(template)) {
          result[key] = mergeTemplate(template[key], isPlainObject(value) ? value[key] : undefined);
        }
        if (isPlainObject(value)) {
          for (const key of Object.keys(value)) {
            if (!(key in result)) result[key] = value[key];
          }
        }
        return result;
      }

      function isSelectStyleField(key) {
        return [
          "slot",
          "exclusiveGroup",
          "incompatibleWith",
          "occupiesSlots",
          "allowedJobs",
          "allowedGenders",
        ].includes(key);
      }

      function renderValue(parent, path, value, key) {
        if (isPlainObject(value)) {
          const group = document.createElement("div");
          group.className = "group" + (isCompactGroup(value) ? " compact-fields" : "");
          const header = document.createElement("div");
          header.className = "group-header";
          const title = document.createElement("h3");
          title.textContent = path.length === 0 ? "配置内容" : labelFor(key);
          const sub = document.createElement("div");
          sub.className = "field-path";
          sub.textContent = path.length === 0 ? selectedFile.path : path.join(".");
          header.appendChild(title);
          header.appendChild(sub);
          group.appendChild(header);
          for (const childKey of orderedKeys(value, path)) {
            renderValue(group, [...path, childKey], value[childKey], childKey);
          }
          parent.appendChild(group);
          return;
        }

        const row = document.createElement("div");
        row.className = "field-row" + (isSelectStyleField(key) ? " select-row" : "");
        const label = document.createElement("div");
        label.className = "field-label";
        const name = document.createElement("div");
        name.className = "field-name";
        name.textContent = labelFor(key);
        const help = helpFor(path, key);
        if (help) {
          const helpIcon = document.createElement("span");
          helpIcon.className = "field-help-icon";
          helpIcon.textContent = "?";
          helpIcon.dataset.tip = help;
          name.appendChild(helpIcon);
        }
        const pathNode = document.createElement("div");
        pathNode.className = "field-path";
        pathNode.textContent = path.join(".");
        label.appendChild(name);
        label.appendChild(pathNode);

        const controlWrap = document.createElement("div");
        controlWrap.className = "field-control";
        const input = document.createElement("input");
        input.dataset.path = JSON.stringify(path);
        input.dataset.type = valueType(value);
        input.value = valueToInput(value);
        if (typeof value === "number") {
          input.type = "number";
          input.step = Number.isInteger(value) ? "1" : "0.01";
        } else if (typeof value === "boolean") {
          input.type = "checkbox";
          input.checked = value;
          input.value = "true";
        } else {
          input.type = "text";
        }
        fieldControls.set(path.join("."), input);
        renderFieldControl(controlWrap, input, path, key);

        row.appendChild(label);
        row.appendChild(controlWrap);
        parent.appendChild(row);
      }

      function orderedKeys(value, path = []) {
        const keys = Object.keys(value);

        const equipmentOrder = [
          "id",
          "name",
          "minLevel",
          "slotCount",
          "slot",
          "exclusiveGroup",
          "incompatibleWith",
          "occupiesSlots",
          "allowedJobs",
          "allowedGenders",
          "stat",
          "combatStat",
          "requirement",
        ];

        const jobStatsOrder = [
          "name",
          "attackIntervalMs",
          "allocation",
          "attackInterval",
        ];

        const jobSkillsOrder = [
          "id",
          "name",
          "activeMs",
          "startupMs",
          "recoveryMs",
          "cooldownMs",
          "height",
          "mpCost",
          "range",
          "width",
          "damage",
          "projectile",
        ];

        if (keys.includes("slot") || keys.includes("requirement") || keys.includes("combatStat")) {
          const preferred = equipmentOrder.filter((key) => keys.includes(key));
          return [...preferred, ...keys.filter((key) => !preferred.includes(key))];
        }

        const currentKey = path[path.length - 1] || "";
        if (currentKey === "attackInterval") {
          const attackIntervalOrder = [
            "activeMs",
            "startupMs",
            "recoveryMs",
            "baseMs",
            "maxMs",
            "minMs",
            "reduction",
          ];
          const preferred = attackIntervalOrder.filter((key) => keys.includes(key));
          return [...preferred, ...keys.filter((key) => !preferred.includes(key))];
        }

        if (keys.includes("attackInterval") || keys.includes("allocation") || keys.includes("attackIntervalMs")) {
          const preferred = jobStatsOrder.filter((key) => keys.includes(key));
          return [...preferred, ...keys.filter((key) => !preferred.includes(key))];
        }

        if (keys.includes("mpCost") || keys.includes("projectile") || keys.includes("damage")) {
          const preferred = jobSkillsOrder.filter((key) => keys.includes(key));
          return [...preferred, ...keys.filter((key) => !preferred.includes(key))];
        }

        const first = ["id", "name"].filter((key) => keys.includes(key));
        return [...first, ...keys.filter((key) => !first.includes(key))];
      }

      function labelFor(key) {
        return labels[key] || key;
      }

      function helpFor(path, key) {
        if (selectedFile && selectedFile.category === "job_stats" && path[0] === "allocation") {
          return "百分比属性：填写百分比，100 表示对应主属性的 100%。";
        }
        return helpText[key];
      }

      function isPlainObject(value) {
        return value && typeof value === "object" && !Array.isArray(value);
      }

      function isCompactGroup(value) {
        if (!isPlainObject(value)) return false;
        const simpleFieldCount = Object.values(value).filter((item) => !isPlainObject(item)).length;
        return simpleFieldCount >= 2;
      }

      function valueType(value) {
        if (Array.isArray(value)) return "array";
        if (typeof value === "number") return Number.isInteger(value) ? "int" : "float";
        if (typeof value === "boolean") return "bool";
        if (value === null) return "null";
        return "string";
      }

      function displayOptionLabel(key, value) {
        if (key === "slot" || key === "occupiesSlots") {
          return equipmentSlotLabels[value] || value;
        }
        if (key === "allowedGenders") {
          return genderLabels[value] || value;
        }
        return value;
      }

      function valueToInput(value) {
        if (Array.isArray(value)) return value.join(",");
        if (value === null || value === undefined) return "";
        return String(value);
      }

      function renderFieldControl(parent, input, path, key) {
        if (selectedFile && selectedFile.category === "equipment" && key === "slot") {
          renderSingleSelect(parent, input, equipmentSlotOptions, key);
          return;
        }
        if (selectedFile && selectedFile.category === "equipment" && key === "occupiesSlots") {
          renderMultiSelect(parent, input, occupySlotOptions, key);
          return;
        }
        if (selectedFile && selectedFile.category === "equipment" && key === "allowedGenders") {
          renderMultiSelect(parent, input, ["male", "female"], key);
          return;
        }
        if (selectedFile && selectedFile.category === "equipment" && key === "allowedJobs") {
          renderMultiSelect(parent, input, jobOptions.length ? jobOptions : ["beginner"], key);
          return;
        }
        if (selectedFile && selectedFile.category === "equipment" && key === "exclusiveGroup") {
          renderSingleSelect(parent, input, equipmentExclusiveGroupOptions, key);
          return;
        }
        if (selectedFile && selectedFile.category === "equipment" && key === "incompatibleWith") {
          renderMultiSelect(parent, input, equipmentIDOptions, key);
          return;
        }
        parent.appendChild(input);
      }

      function renderSingleSelect(parent, input, options, key = "") {
        input.type = "hidden";
        parent.appendChild(input);

        const wrapper = document.createElement("div");
        wrapper.className = "multi-select";

        const trigger = document.createElement("button");
        trigger.type = "button";
        trigger.className = "multi-select-trigger secondary";

        const valueNode = document.createElement("span");
        valueNode.className = "multi-select-value";

        const arrow = document.createElement("span");
        arrow.className = "multi-select-arrow";
        arrow.textContent = "\u25bc";

        trigger.appendChild(valueNode);
        trigger.appendChild(arrow);

        const menu = document.createElement("div");
        menu.className = "multi-select-menu";

        function updateDisplay() {
          if (!input.value) {
            valueNode.textContent = "\u8bf7\u9009\u62e9";
            valueNode.classList.add("placeholder");
          } else {
            valueNode.textContent = displayOptionLabel(key, input.value);
            valueNode.classList.remove("placeholder");
          }
        }

        for (const optionValue of options) {
          const option = document.createElement("button");
          option.type = "button";
          option.className = "multi-select-option secondary";
          option.textContent = displayOptionLabel(key, optionValue);
          option.addEventListener("click", (event) => {
            event.preventDefault();
            event.stopPropagation();
            input.value = optionValue;
            updateDisplay();
            wrapper.classList.remove("open");
          });
          menu.appendChild(option);
        }

        updateDisplay();

        trigger.addEventListener("click", (event) => {
          event.preventDefault();
          event.stopPropagation();
          document.querySelectorAll(".multi-select.open").forEach((node) => {
            if (node !== wrapper) node.classList.remove("open");
          });
          wrapper.classList.toggle("open");
        });

        menu.addEventListener("click", (event) => {
          event.stopPropagation();
        });

        wrapper.appendChild(trigger);
        wrapper.appendChild(menu);
        parent.appendChild(wrapper);
      }

      function renderMultiSelect(parent, input, options, key = "") {
        input.type = "hidden";
        parent.appendChild(input);

        const wrapper = document.createElement("div");
        wrapper.className = "multi-select";

        const trigger = document.createElement("button");
        trigger.type = "button";
        trigger.className = "multi-select-trigger secondary";

        const valueNode = document.createElement("span");
        valueNode.className = "multi-select-value";

        const arrow = document.createElement("span");
        arrow.className = "multi-select-arrow";
        arrow.textContent = "\u25bc";

        trigger.appendChild(valueNode);
        trigger.appendChild(arrow);

        const menu = document.createElement("div");
        menu.className = "multi-select-menu";

        const checkboxes = [];

        function selectedValues() {
          return checkboxes.filter((checkbox) => checkbox.checked).map((checkbox) => checkbox.value);
        }

        function syncInput() {
          input.value = selectedValues().join(",");
        }

        function updateDisplay() {
          const values = selectedValues();
          if (values.length === 0) {
            valueNode.textContent = "\u8bf7\u9009\u62e9";
            valueNode.title = "";
            valueNode.classList.add("placeholder");
            return;
          }

          const labels = values.map((value) => displayOptionLabel(key, value));
          valueNode.title = labels.join(", ");
          if (labels.length === 1) {
            valueNode.textContent = labels[0];
          } else {
            valueNode.textContent = labels[0] + " \u7b49" + labels.length + "\u9879";
          }
          valueNode.classList.remove("placeholder");
        }

        for (const optionValue of options) {
          const optionLabel = document.createElement("label");
          optionLabel.className = "multi-select-option";

          const checkbox = document.createElement("input");
          checkbox.type = "checkbox";
          checkbox.value = optionValue;
          checkboxes.push(checkbox);

          const text = document.createElement("span");
          text.textContent = displayOptionLabel(key, optionValue);

          checkbox.addEventListener("change", () => {
            syncInput();
            updateDisplay();
          });

          optionLabel.appendChild(checkbox);
          optionLabel.appendChild(text);
          menu.appendChild(optionLabel);
        }

        const initial = new Set(valueToInput(inputToValue(input)).split(",").filter(Boolean));
        for (const checkbox of checkboxes) {
          checkbox.checked = initial.has(checkbox.value);
        }
        syncInput();
        updateDisplay();

        trigger.addEventListener("click", (event) => {
          event.preventDefault();
          event.stopPropagation();
          document.querySelectorAll(".multi-select.open").forEach((node) => {
            if (node !== wrapper) node.classList.remove("open");
          });
          wrapper.classList.toggle("open");
        });

        menu.addEventListener("click", (event) => {
          event.stopPropagation();
        });

        wrapper.appendChild(trigger);
        wrapper.appendChild(menu);
        parent.appendChild(wrapper);
      }

      function collectConfig() {
        const result = structuredClone(currentConfig);
        for (const input of fieldControls.values()) {
          const path = JSON.parse(input.dataset.path);
          setByPath(result, path, inputToValue(input));
        }
        return result;
      }

      function inputToValue(input) {
        const type = input.dataset.type;
        if (type === "bool") return input.checked;
        if (type === "int") return Number.parseInt(input.value || "0", 10) || 0;
        if (type === "float") return Number.parseFloat(input.value || "0") || 0;
        if (type === "array") {
          return input.value
            .split(",")
            .map((item) => item.trim())
            .filter(Boolean);
        }
        if (type === "null") return input.value.trim() === "" ? null : input.value;
        return input.value;
      }

      function setByPath(target, path, value) {
        let cursor = target;
        for (let i = 0; i < path.length - 1; i++) cursor = cursor[path[i]];
        cursor[path[path.length - 1]] = value;
      }

      async function saveConfigFile() {
        if (!selectedFile || !currentConfig) return;
        const nextConfig = collectConfig();
        const payload = JSON.stringify(nextConfig, null, 2);
        const button = $("save");
        button.disabled = true;
        button.textContent = "保存中...";
        setStatus(`Saving ${selectedFile.category}/${selectedFile.path}...`);
        try {
          const response = await fetch(configFileURL(selectedFile), {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: payload,
          });
          let result = {};
          try {
            result = await response.json();
          } catch (_error) {}
          if (!response.ok) throw new Error(result.error || `HTTP ${response.status}`);
          currentConfig = nextConfig;
          renderForm(currentConfig);
          setStatus(`Saved ${selectedFile.category}/${selectedFile.path}. 如需运行中生效，请执行配置重载。`);
        } catch (error) {
          setStatus(`Save failed: ${error.message}`);
        } finally {
          button.textContent = "保存到文件";
          button.disabled = !selectedFile;
        }
      }

      $("category").addEventListener("change", () => {
        selectedFile = null;
        currentConfig = null;
        fieldControls.clear();
        $("save").disabled = true;
        $("currentFile").textContent = "请选择一个配置文件";
        $("formRoot").innerHTML = '<div class="status">请选择左侧配置文件。</div>';
        renderFileList();
      });
      document.addEventListener("click", (event) => {
        document.querySelectorAll(".multi-select.open").forEach((node) => {
          if (!node.contains(event.target)) node.classList.remove("open");
        });
      });

      $("reloadFiles").addEventListener("click", loadFiles);
      $("newConfig").addEventListener("click", createNewConfig);
      $("save").addEventListener("click", saveConfigFile);

      loadTemplates()
        .then(loadFiles)
        .catch((error) => {
          setStatus(`Failed to load templates: ${error.message}`);
        });
    </script>
  </body>
</html>
